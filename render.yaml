services:
  - type: web
    name: restopulse-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build && npm run db:migrate:prod
    startCommand: npm start
    envVars:
      - key: DB_PROVIDER
        value: postgresql
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://restopulse-web.onrender.com
      - key: PORT
        value: "10000"
    dependsOn:
      - name: restopulse-db

databases:
  - name: restopulse-db
    databaseName: restopulse
    user: restopulse
    plan: free

staticSites:
  - name: restopulse-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://restopulse-api.onrender.com/api
